<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Flyrank Frontend Internship</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="page-header">
    <h1>Account Settings</h1>
    <p class="page-header__subtitle">Update your profile and preferences.</p>
  </header>

  <main class="settings-page">
    <form id="settings-form" class="settings-form" novalidate>
      <section class="settings-form__section" aria-labelledby="profile-heading">
        <h2 id="profile-heading">Profile</h2>

        <div class="form-field">
          <label for="display-name">Display name</label>
          <input
            type="text"
            id="display-name"
            name="displayName"
            autocomplete="name"
            required
            minlength="2"
            maxlength="50"
            placeholder="Jane Doe"
          >
          <p class="form-field__error" id="display-name-error" role="alert"></p>
        </div>

        <div class="form-field">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
            placeholder="jane@example.com"
          >
          <p class="form-field__error" id="email-error" role="alert"></p>
        </div>

        <div class="form-field">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            required
            minlength="3"
            maxlength="20"
            pattern="^[a-zA-Z0-9_]+$"
            placeholder="jane_doe"
          >
          <p class="form-field__hint">3–20 characters. Letters, numbers, and underscores only.</p>
          <p class="form-field__error" id="username-error" role="alert"></p>
        </div>

        <div class="form-field">
          <label for="bio">Bio <span class="form-field__optional">(optional)</span></label>
          <textarea
            id="bio"
            name="bio"
            rows="4"
            maxlength="200"
            placeholder="Tell us a little about yourself."
          ></textarea>
          <p class="form-field__hint"><span id="bio-count">0</span> / 200 characters</p>
          <p class="form-field__error" id="bio-error" role="alert"></p>
        </div>
      </section>

      <section class="settings-form__section" aria-labelledby="preferences-heading">
        <h2 id="preferences-heading">Preferences</h2>

        <fieldset class="form-field form-field--fieldset">
          <legend>Theme</legend>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="theme" value="light" checked>
              Light
            </label>
            <label class="radio-option">
              <input type="radio" name="theme" value="dark">
              Dark
            </label>
            <label class="radio-option">
              <input type="radio" name="theme" value="system">
              System
            </label>
          </div>
          <p class="form-field__error" id="theme-error" role="alert"></p>
        </fieldset>

        <div class="form-field">
          <label for="language">Language</label>
          <select id="language" name="language" required>
            <option value="">Select a language</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
          </select>
          <p class="form-field__error" id="language-error" role="alert"></p>
        </div>

        <div class="form-field form-field--checkbox">
          <label class="checkbox-option">
            <input type="checkbox" id="notifications" name="notifications">
            Email me about product updates
          </label>
        </div>
      </section>

      <section class="settings-form__section" aria-labelledby="security-heading">
        <h2 id="security-heading">Security</h2>

        <div class="form-field">
          <label for="current-password">Current password</label>
          <input
            type="password"
            id="current-password"
            name="currentPassword"
            autocomplete="current-password"
            required
            minlength="8"
          >
          <p class="form-field__error" id="current-password-error" role="alert"></p>
        </div>

        <div class="form-field">
          <label for="new-password">New password</label>
          <input
            type="password"
            id="new-password"
            name="newPassword"
            autocomplete="new-password"
            minlength="8"
            placeholder="Leave blank to keep current password"
          >
          <p class="form-field__hint">At least 8 characters with one letter and one number.</p>
          <p class="form-field__error" id="new-password-error" role="alert"></p>
        </div>

        <div class="form-field">
          <label for="confirm-password">Confirm new password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirmPassword"
            autocomplete="new-password"
          >
          <p class="form-field__error" id="confirm-password-error" role="alert"></p>
        </div>
      </section>

      <div class="settings-form__actions">
        <button type="button" class="btn btn--secondary" id="reset-btn">Reset</button>
        <button type="submit" class="btn btn--primary">Save settings</button>
      </div>

      <p class="form-status" id="form-status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
