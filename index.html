<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flyrank Frontend Internship</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Flyrank Frontend Internship Capstone</h1>
  </header>

  <main>
    <section class="settings-section" aria-labelledby="settings-heading">
      <h2 id="settings-heading">Settings</h2>

      <form id="settings-form" class="settings-form" novalidate>
        <div class="form-field">
          <label for="full-name">Full name <span class="required-indicator" aria-hidden="true">*</span></label>
          <input
            type="text"
            id="full-name"
            name="fullName"
            autocomplete="name"
            required
            aria-describedby="full-name-error"
          >
          <span class="field-error" id="full-name-error" role="alert"></span>
        </div>

        <div class="form-field">
          <label for="email">Email <span class="required-indicator" aria-hidden="true">*</span></label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            required
            aria-describedby="email-error"
          >
          <span class="field-error" id="email-error" role="alert"></span>
        </div>

        <div class="form-field">
          <label for="password">Password <span class="required-indicator" aria-hidden="true">*</span></label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="new-password"
            required
            aria-describedby="password-error"
          >
          <span class="field-error" id="password-error" role="alert"></span>
        </div>

        <button type="submit" class="submit-button">Save settings</button>
      </form>
    </section>
  </main>

  <script src="js/settings.js"></script>
</body>
</html>
